app-id: org.example.FlatpakSmokeFixture
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: flatpak-smoke-fixture
finish-args:
  - --socket=wayland
modules:
  - name: flatpak-smoke-fixture
    buildsystem: simple
    build-commands:
      - cc fixture.c -o flatpak-smoke-fixture $(pkg-config --cflags --libs gtk4)
      - install -Dm755 flatpak-smoke-fixture /app/bin/flatpak-smoke-fixture
    sources:
      - type: file
        path: fixture.c
